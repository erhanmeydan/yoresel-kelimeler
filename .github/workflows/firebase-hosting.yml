name: Deploy to Firebase Hosting

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build:web

      - name: Install functions dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: functions
        run: npm ci --legacy-peer-deps

      - name: Build functions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: functions
        run: npm run build

      - name: Comment PR with preview URL
        # Fork PR'larında GITHUB_TOKEN read-only → 403. Build yine de çalışır,
        # preview URL'i PR'a manuel yorum olarak eklenebilir veya trusted mirror
        # PR ile otomatik gelir.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          CHANNEL_ID: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const channelId = process.env.CHANNEL_ID;
            const url = `https://${channelId}--yoresel-kelimeler.web.app/`;
            const body = `🚀 **Preview deploy tamamlandı!**\n\n🔗 ${url}\n\n_30 gün sonra expire olur._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Deploy (PR → preview channel)
        if: github.event_name == 'pull_request'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx -y firebase-tools@latest hosting:channel:deploy pr-${{ github.event.pull_request.number }} --expires 30d --project yoresel-kelimeler

      - name: Deploy (main → live)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx -y firebase-tools@latest deploy --only hosting,functions --project yoresel-kelimeler